<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decline - AI Logo Synthesizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #0a0a0a;
      color: #e5e5e5;
      overflow: hidden;
    }
    .loader {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid #404040;
      border-top-color: #ef4444;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body class="flex h-screen">

  <!-- Left Control Panel -->
  <div class="w-full md:w-1/3 bg-black/50 p-8 flex flex-col justify-between">
    <div>
      <h1 class="text-4xl font-bold text-white">DECLINE</h1>
      <p class="text-lg text-red-500 mt-1">Logo Synthesizer</p>
      <p class="text-neutral-400 mt-6 text-sm leading-relaxed">
        This tool leverages generative AI to create unique visual identities for our offensive security division. Click the button to generate a new logo concept.
      </p>
    </div>
    <div>
      <button id="generateLogo" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-all duration-300 flex items-center justify-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-repeat" viewBox="0 0 16 16">
          <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/>
          <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.5A5.002 5.002 0 0 0 8 3zM3.5 12A5.002 5.002 0 0 0 8 15c1.552 0 2.94-.707 3.857-1.818a.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.5A5.002 5.002 0 0 0 8 15z"/>
        </svg>
        <span>Generate New Logo</span>
      </button>
      <div id="errorMessage" class="text-red-400 text-center mt-4 text-sm hidden"></div>
    </div>
  </div>

  <!-- Right Display Panel -->
  <div class="w-full md:w-2/3 bg-neutral-900/70 flex items-center justify-center p-8 relative">
    <div id="loading" class="loader hidden"></div>
    <div id="logoDisplay" class="w-full h-full flex items-center justify-center">
      <!-- Generated logo will appear here -->
    </div>
  </div>

  <script>
    const generateLogoButton = document.getElementById('generateLogo');
    const loadingIndicator = document.getElementById('loading');
    const logoDisplay = document.getElementById('logoDisplay');
    const errorMessage = document.getElementById('errorMessage');

    const apiKey = ""; // Place your Gemini API key here

    generateLogoButton.addEventListener('click', generateLogo);

    async function generateLogo() {
      loadingIndicator.classList.remove('hidden');
      logoDisplay.innerHTML = '';
      errorMessage.classList.add('hidden');

      const prompt = `An ultra-sleek, premium logo for an elite cybersecurity firm named "DECLINE". The design must be suitable for a multinational corporation, embodying 'offensive security' with sophistication and power. The central theme is a stylized, abstract symbol representing a precise, surgical breach or a digital falcon striking. The aesthetic should be minimalist yet impactful, using sharp, geometric lines. The color palette must be luxurious and professional: a dominant deep obsidian black and metallic charcoal grey, accented with a sharp, glowing crimson red to signify a targeted vulnerability. The overall feel should be confident, intelligent, and formidable. The logo should be on a dark, clean background. Do not include any text in the image.`;

      if (!apiKey) {
        // Mock preview for demo purposes
        logoDisplay.innerHTML = `
          <img src="https://via.placeholder.com/400x300/111111/ff4444?text=Decline+Logo+Preview" alt="Mock Logo" class="rounded-lg shadow-xl object-contain" />
        `;
        loadingIndicator.classList.add('hidden');
        return;
      }

      try {
        const payload = {
          instances: { prompt: prompt },
          parameters: { sampleCount: 1 }
        };

        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${apiKey}`;

        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const result = await response.json();

        if (result.predictions && result.predictions[0].bytesBase64Encoded) {
          const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
          logoDisplay.innerHTML = `<img src="${imageUrl}" alt="Decline Logo" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">`;
        } else {
          errorMessage.textContent = 'Failed to generate logo. Please try again.';
          errorMessage.classList.remove('hidden');
        }
      } catch (error) {
        console.error('Error generating logo:', error);
        errorMessage.textContent = 'An error occurred during logo generation.';
        errorMessage.classList.remove('hidden');
      } finally {
        loadingIndicator.classList.add('hidden');
      }
    }

    window.onload = generateLogo;
  </script>
</body>
</html>
