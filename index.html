<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decline Security</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px #00ff00;
    }

    p {
      font-size: 1.2rem;
      text-align: center;
      max-width: 600px;
      margin: 0.5rem 0;
    }

    .glitch {
      color: #00ff00;
      text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
      animation: flicker 1.5s infinite alternate;
    }

    @keyframes flicker {
      from { opacity: 1; }
      to { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <h1 class="glitch">Decline Security</h1>
  <p>Offensive Security • Red Team • Adversary Simulation</p>
  <p>We don’t defend. We <strong>decline.</strong></p>
  <p><em>Website Under Construction...</em></p>
</body>
</html>
