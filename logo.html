<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decline Cybersecurity Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: #ff2c2c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
    }

    .logo-container {
      text-align: center;
      animation: flicker 2s infinite;
    }

    .logo {
      font-size: 3rem;
      letter-spacing: 0.1em;
      text-shadow: 0 0 5px #ff2c2c, 0 0 10px #ff2c2c, 0 0 20px #ff2c2c;
    }

    .tagline {
      font-size: 1rem;
      color: #c0392b;
      margin-top: 0.5rem;
      opacity: 0.7;
      letter-spacing: 0.05em;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      40% { opacity: 0.9; }
      50% { opacity: 0.7; }
      60% { opacity: 1; }
      70% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo">DECLINE.RED</div>
    <div class="tagline">Offensive Security & Penetration Testing</div>
  </div>
</body>
</html>
