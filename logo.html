<!DOCTYPE html>
<html lang="en">
<head>

  <title>Decline Cybersecurity Logo</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>

  <div class="logo-wrapper">

      <rect width="400" height="400" rx="40" fill="#ff1a1a"/>
      <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Inter, sans-serif" font-size="48" fill="white">DECLINE</text>
    </svg>
    <!-- 👆 Gemini AI Logo Code Ends Here 👆 -->

  </div>
