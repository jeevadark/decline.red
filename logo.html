<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decline Cybersecurity Logo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #1a202c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .container {
      background-color: #2d3748;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 600px;
    }
    img {
      max-width: 100%;
      border-radius: 0.75rem;
      border: 2px solid #4a5568;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: white;
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Decline Cybersecurity Logo</h1>
    <img src="your-logo-file-path.png" alt="Decline Logo"/>
  </div>
</body>
</html>
